name: Deploy changed files to server

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ftp-push-changed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Upload only changed files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: /velmorabank.us/htdocs
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "Missing FTP secrets"
            exit 1
          fi

          echo "Changed files:"
          git diff --name-status HEAD^ HEAD || true

          git diff --name-status HEAD^ HEAD | while IFS=$'\t' read -r status file; do
            [ -z "$file" ] && continue

            case "$file" in
              .github/*|.git/*|node_modules/*)
                echo "Skipping $file"
                continue
                ;;
            esac

            remote_path="$REMOTE_DIR/$file"
            remote_dir="$(dirname "$remote_path")"

            if [ "$status" = "D" ]; then
              echo "Deleting remote file: $remote_path"
              curl --silent --show-error --fail \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                -Q "-DELE $remote_path" \
                "ftp://$FTP_SERVER/" || true
            else
              echo "Uploading: $file -> $remote_path"
              curl --silent --show-error --fail \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                --ftp-create-dirs \
                -T "$file" \
                "ftp://$FTP_SERVER$remote_dir/"
            fi
          done            /velmorabank.us/htdocs ./
          bye
          EOF

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Sync files from server"

      - name: Push files to repo
        run: git push origin HEAD:main
      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Sync files from server"

      - name: Push files to repo
        run: git push origin HEAD:main
